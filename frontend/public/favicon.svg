<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Donut ring segments -->
  <g transform="translate(64,64)">
    <!-- Blue segment (library) -->
    <circle r="38" fill="none" stroke="#3b82f6" stroke-width="14"
      stroke-dasharray="143 239" stroke-dashoffset="0" stroke-linecap="round"/>
    <!-- Green segment (uploads) -->
    <circle r="38" fill="none" stroke="#22c55e" stroke-width="14"
      stroke-dasharray="60 239" stroke-dashoffset="-143" stroke-linecap="round"/>
    <!-- Purple segment (video) -->
    <circle r="38" fill="none" stroke="#a855f7" stroke-width="14"
      stroke-dasharray="24 239" stroke-dashoffset="-203" stroke-linecap="round"/>
    <!-- Yellow segment (backups) -->
    <circle r="38" fill="none" stroke="#eab308" stroke-width="14"
      stroke-dasharray="12 239" stroke-dashoffset="-227" stroke-linecap="round"/>
  </g>
  <!-- Sync arrow (up) -->
  <g transform="translate(64,64)" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-7,6 L0,-6 L7,6"/>
    <line x1="0" y1="-6" x2="0" y2="12"/>
  </g>
</svg>
